<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%2300ff00' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='16' fill='none' stroke='%2300ff00' stroke-width='1.5'/%3E%3Ccircle cx='32' cy='32' r='5' fill='%2300ff00'/%3E%3Cline x1='32' y1='0' x2='32' y2='14' stroke='%2300ff00' stroke-width='2.5'/%3E%3Cline x1='32' y1='50' x2='32' y2='64' stroke='%2300ff00' stroke-width='2.5'/%3E%3Cline x1='0' y1='32' x2='14' y2='32' stroke='%2300ff00' stroke-width='2.5'/%3E%3Cline x1='50' y1='32' x2='64' y2='32' stroke='%2300ff00' stroke-width='2.5'/%3E%3C/svg%3E"/>
    <link rel="manifest" href="./manifest.json"/>

    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Current standard (replaces the deprecated apple-only version) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Keep apple version alongside for older iOS compatibility -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Our Story" />

    <title>Our Story</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />

    <!-- Updated path -->
    <link rel="stylesheet" href="./css/OurStory.css" />
  </head>

  <body>

    <header id="topbar" role="banner">
      <button
        id="menu-toggle"
        class="hamburger-btn"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="sidebar"
      >
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <div class="topbar-title" aria-hidden="true">
        <span class="topbar-heart">&#9829;</span>
        Our Story
      </div>
    </header>

    <div id="sidebar-overlay" aria-hidden="true" role="presentation"></div>

    <aside id="sidebar" aria-label="Site navigation">

      <div class="sidebar-brand">
        <span class="brand-heart" aria-hidden="true">&#9829;</span>
        <span class="brand-name">Our Story</span>
      </div>

      <nav id="sidebar-nav" aria-label="Main menu">

        <a class="nav-link active" data-section="couple" href="#" aria-current="page">
          <span class="nav-icon" aria-hidden="true">&#9672;</span>
          <span class="nav-label">Us</span>
        </a>

        <a class="nav-link" data-section="person1" href="#">
          <span class="nav-icon" aria-hidden="true">&#9675;</span>
          <span class="nav-label" id="nav-label-person1">Person 1</span>
        </a>

        <a class="nav-link" data-section="person2" href="#">
          <span class="nav-icon" aria-hidden="true">&#9675;</span>
          <span class="nav-label" id="nav-label-person2">Person 2</span>
        </a>

        <div class="nav-divider" role="separator" aria-hidden="true"></div>

        <a class="nav-link" data-section="dates" href="#">
          <span class="nav-icon" aria-hidden="true">&#9656;</span>
          <span class="nav-label">Dates &amp; Milestones</span>
        </a>

        <a class="nav-link" data-section="notes" href="#">
          <span class="nav-icon" aria-hidden="true">&#9656;</span>
          <span class="nav-label">Love Notes</span>
        </a>

        <div class="nav-divider" role="separator" aria-hidden="true"></div>

        <a class="nav-link" data-section="data" href="#">
          <span class="nav-icon" aria-hidden="true">&#9656;</span>
          <span class="nav-label">Save &amp; Load</span>
        </a>

      </nav>

      <div class="sidebar-footer" aria-hidden="true">
        <span class="sidebar-footer-text">made with love</span>
      </div>

    </aside>

    <main id="content" role="main" aria-live="polite"></main>

    <!-- Hidden utility inputs — outside #content so they survive re-renders -->
    <input type="file" id="json-import-input" accept=".json,application/json" style="display:none;" />
    <input type="file" id="photo-upload-person1" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;" />
    <input type="file" id="photo-upload-person2" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;" />

    <!-- Updated path, type="module" still valid for plain ES modules in browser -->
    <script type="module" src="./js/OurStory.js"></script>

  </body>
</html>
