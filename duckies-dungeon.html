<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DUCKIE'S DUNGEON</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(4px, 2vw, 20px);
            gap: clamp(2px, 0.5vh, 8px);
        }
        h1 {
            font-size: clamp(8px, 2.5vw, 14px);
            margin: 0;
        }
        #stats {
            border: 1px solid #0f0;
            padding: clamp(2px, 0.5vh, 6px);
            background: #0a0a0a;
            font-size: clamp(6px, 1.5vw, 9px);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: clamp(1px, 0.3vh, 4px);
            width: clamp(150px, 90vw, 350px);
            max-width: 95vw;
        }
        .stat {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .stat-bar {
            background: #333;
            border: 1px solid #0f0;
            height: clamp(3px, 0.4vh, 6px);
        }
        .stat-fill {
            background: #0f0;
            height: 100%;
        }
        .equip {
            font-size: clamp(5px, 1vw, 7px);
            color: #0ff;
        }
        #dungeon {
            border: 1px solid #0f0;
            padding: clamp(2px, 0.5vh, 6px);
            background: #0a0a0a;
            width: clamp(140px, 80vw, 320px);
            max-width: 90vw;
        }
        .row {
            display: flex;
            gap: 0;
            line-height: 1;
        }
        .cell {
            flex: 1;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(5px, 1.5vw, 9px);
            font-weight: bold;
            min-width: 8px;
            min-height: 8px;
        }
        .cell.wall { background: #333; }
        .cell.floor { background: #0a0a0a; }
        .cell.treasure { background: #aa0; color: #000; }
        .cell.trap { background: #a00; color: #fff; }
        .cell.safe { background: #0aa; color: #000; }
        .cell.player { background: #0f0; color: #000; }
        .cell.enemy { background: #f00; color: #000;}
        .cell.gold { background: #ffff00; color: #000;}
        
        #info {
            border: 1px solid #0f0;
            padding: clamp(2px, 0.5vh, 6px);
            background: #0a0a0a;
            font-size: clamp(6px, 1.2vw, 8px);
            line-height: 1.2;
            height: clamp(20px, 8vh, 40px);
            overflow-y: auto;
            color: #ff0;
            width: clamp(140px, 80vw, 320px);
            max-width: 90vw;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            border: 2px solid #0f0;
            background: #0a0a0a;
            padding: clamp(10px, 2vw, 20px);
            width: clamp(220px, 95vw, 500px);
            max-height: 90vh;
            overflow-y: auto;
            color: #0f0;
            font-size: clamp(8px, 1.3vw, 11px);
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: clamp(4px, 1vh, 8px);
            right: clamp(4px, 1vw, 8px);
            background: #f00;
            color: #fff;
            border: 1px solid #f00;
            cursor: pointer;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: bold;
            width: clamp(20px, 5vw, 30px);
            height: clamp(20px, 5vw, 30px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }
        
        .close-btn:hover {
            background: #cc0000;
        }
        
        .section-title {
            color: #0ff;
            font-weight: bold;
            margin-top: clamp(12px, 2vh, 20px);
            margin-bottom: clamp(6px, 1vh, 10px);
            border-bottom: 1px solid #0f0;
            padding-bottom: 4px;
        }
        
        .section-title:first-child {
            margin-top: clamp(20px, 3vh, 30px);
        }
        
        .item {
            border: 1px solid #0f0;
            padding: clamp(4px, 1vh, 8px);
            margin-bottom: clamp(4px, 0.7vh, 8px);
        }
        
        .item-name {
            color: #0ff;
            font-weight: bold;
            margin-bottom: 2px;
        }
        
        .item-desc {
            font-size: clamp(7px, 1vw, 9px);
            color: #0f0;
        }
        
        .status-active {
            background: rgba(0, 255, 0, 0.15);
            border-left: 3px solid #0f0;
        }
        
        .perk {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            padding: clamp(4px, 1vh, 8px);
            margin-bottom: clamp(4px, 0.7vh, 8px);
            color: #0f0;
        }
        
        .shop-item {
            border: 1px solid #0f0;
            padding: clamp(4px, 1vh, 8px);
            margin-bottom: clamp(4px, 0.7vh, 8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .shop-btn {
            background: #0f0;
            color: #000;
            border: 1px solid #0f0;
            padding: clamp(3px, 0.5vh, 6px);
            cursor: pointer;
            font-family: monospace;
            font-size: clamp(7px, 1vw, 9px);
            font-weight: bold;
        }
        
        .shop-btn:hover {
            background: #0a0;
        }
        
        .shop-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        
        #fullscreenBtn {
            position: fixed;
            top: clamp(8px, 3vh, 30px);
            right: clamp(8px, 3vw, 30px);
            z-index: 999;
        }
        
        .controls {
            position: fixed;
            bottom: clamp(8px, 3vh, 30px);
            right: clamp(8px, 3vw, 30px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(2px, 1vw, 8px);
            z-index: 1000;
        }
        
        .btn {
            background: rgba(0, 255, 0, 0.3);
            color: #0f0;
            border: 1px solid rgba(0, 255, 0, 0.5);
            font-weight: bold;
            cursor: pointer;
            font-size: clamp(10px, 3vw, 16px);
            font-family: monospace;
            touch-action: none;
            width: clamp(30px, 8vw, 50px);
            height: clamp(30px, 8vw, 50px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
        .btn:active { 
            background: rgba(0, 255, 0, 0.6);
            border-color: rgba(0, 255, 0, 0.9);
        }

        /* Fullscreen Mode Styles */
        body.fullscreen {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.fullscreen .container {
            padding: clamp(4px, 1vw, 10px);
            gap: clamp(1px, 0.3vh, 4px);
        }

        body.fullscreen h1 {
            font-size: clamp(10px, 3vw, 18px);
        }

        body.fullscreen #stats {
            width: clamp(200px, 95vw, 600px);
        }

        body.fullscreen #dungeon {
            width: clamp(200px, 90vw, 600px);
            padding: clamp(4px, 0.8vh, 10px);
        }

        body.fullscreen #info {
            width: clamp(200px, 90vw, 600px);
        }

        body.fullscreen .controls {
            bottom: clamp(10px, 2vh, 20px);
            right: clamp(10px, 2vw, 20px);
            grid-template-columns: repeat(3, 1fr);
        }

        body.fullscreen .btn {
            width: clamp(35px, 6vw, 45px);
            height: clamp(35px, 6vw, 45px);
            font-size: clamp(10px, 2vw, 14px);
        }

        body.fullscreen #fullscreenBtn {
            width: clamp(30px, 5vw, 40px);
            height: clamp(30px, 5vw, 40px);
            font-size: clamp(10px, 2vw, 12px);
        }
        #deathStats {
            color: #ff0;
            border: 1px solid #0f0;
            padding: clamp(10px, 2vh, 20px);
            margin: clamp(10px, 2vh, 20px) 0;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<button class="btn" id="fullscreenBtn">⛶</button>

<div class="container">
    <h1>DUCKIE'S DUNGEON</h1>
    <h1 style="font-size:clamp(6px,1.5vw,10px);margin-bottom:clamp(1px,0.3vh,4px)">LEVEL <span id="level">1</span></h1>
    
    <div id="stats">
        <div class="stat">
            <span>HP</span>
            <div class="stat-bar"><div class="stat-fill" id="hpBar" style="width:100%"></div></div>
            <span id="hp">10</span>
        </div>
        <div class="stat">
            <span>EXP</span>
            <div class="stat-bar"><div class="stat-fill" id="expBar" style="width:0%"></div></div>
            <span id="exp">0</span>
        </div>
        <div class="stat">
            <span>L<span id="playerLvl">1</span> G<span id="gold">0</span></span>
        </div>
        <div class="stat">
            <span class="equip">W:<span id="weaponLvl">1</span></span>
            <span class="equip">A:<span id="armorLvl">1</span></span>
        </div>
    </div>
    
    <div id="dungeon"></div>
    <div id="info"></div>
</div>

<div class="modal" id="shopModal">
    <div class="modal-content">
        <button class="close-btn" id="closeShop">X</button>
        <h2>SHOP</h2>
        <div id="shopItems"></div>
    </div>
</div>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <button class="close-btn" id="closeInfo">X</button>
        <h2>ENEMIES & STATUS</h2>
        
        <div class="section-title">ENEMIES</div>
        <div id="enemyIndex"></div>
        
        <div class="section-title">YOUR STATUS</div>
        <div id="statusEffects"></div>
        
        <div class="section-title">FLOOR PERKS</div>
        <div id="floorPerks"></div>
    </div>
</div>
<div class="modal" id="deathModal">
    <div class="modal-content">
        <h2>YOU DIED</h2>
        <div id="deathStats"></div>
        <button class="shop-btn" onclick="restartGame()" style="width: 100%; margin-top: 20px;">RESTART</button>
    </div>
</div>
<div class="controls" id="controls">
    <button class="btn" id="shopBtn">S</button>
    <button class="btn" data-dir="0,-1">▲</button>
    <button class="btn" id="infoBtn">I</button>
    <button class="btn" data-dir="-1,0">◄</button>
    <button class="btn" data-dir="0,1">▼</button>
    <button class="btn" data-dir="1,0">►</button>
</div>

<script src="./js/duckies-dungeon.js"></script>
</body>
</html>
