<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Pathfinder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="controls">
      <div class="logo">🌐 Wiki Pathfinder</div>
      <div class="inputs">
        <div class="input-group">
          <label for="startPage">Start Article</label>
          <input id="startPage" type="text" placeholder="e.g. Cat" autocomplete="off" />
          <ul class="suggestions" id="startSuggestions"></ul>
        </div>
        <span class="arrow">→</span>
        <div class="input-group">
          <label for="endPage">Target Article</label>
          <input id="endPage" type="text" placeholder="e.g. Philosophy" autocomplete="off" />
          <ul class="suggestions" id="endSuggestions"></ul>
        </div>
        <button id="findPathBtn">Find Path</button>
        <button id="stopBtn" class="hidden">Stop</button>
      </div>
      <button id="fullscreenBtn" title="Fullscreen">⛶</button>
    </header>
    <div id="main-area">
      <div id="sidebar" class="hidden">
        <div class="dir-status"><span class="dir-label fwd">⟶ FWD</span><span class="dir-info" id="fwdInfo">waiting</span></div>
        <div class="dir-status"><span class="dir-label bwd">⟵ BWD</span><span class="dir-info" id="bwdInfo">waiting</span></div>
        <div id="statsText"></div>
        <div id="you-status" class="hidden">
          <span class="dir-label you">👤 YOU</span>
          <span id="youInfo"></span>
          <div id="youPath"></div>
        </div>
        <div id="path-result" class="hidden">
          <div id="path-header"></div>
          <div id="pathSteps"></div>
        </div>
        <div id="replay-status" class="hidden">Replaying path...</div>
      </div>
      <div id="wiki-view">
        <div id="wiki-title-bar">Wikipedia</div>
        <div id="wiki-content"><p style="padding:40px;color:#888">Type an article name above and press Enter, or click Find Path.</p></div>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
